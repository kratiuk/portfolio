name: GitHub Release

on:
  workflow_run:
    workflows: ["Deploy to Server"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: |
          git fetch --tags --force
          TAG_NAME=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n 1)
          if [ -z "$TAG_NAME" ]; then
            echo "No v-prefixed tag found for commit ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Validate version
        run: node scripts/changelog.js validate ${{ steps.tag.outputs.TAG_NAME }}

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Archive build
        run: |
          cd dist
          zip -r ../dist.zip .

      - name: Extract changelog
        id: changelog
        run: node scripts/changelog.js extract

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: ${{ steps.tag.outputs.TAG_NAME }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist.zip
